# Grafana datasource provisioning. Mounted at /etc/grafana/provisioning/datasources/.
# The uids (prometheus/loki/tempo) match the dashboard JSON + the alerting rules.
#
# PLAIN datasources only — NO cross-datasource `datasourceUid` refs here. Grafana was failing to
# provision with "Datasource provisioning error: data source not found" (×2) because it can't resolve
# a datasourceUid that points at another datasource created in the SAME provisioning batch
# (exemplarTraceIdDestinations → tempo, derivedFields → tempo). Reordering did not help — the refs
# fail regardless of order. The trace correlations (metric→trace exemplars, log→trace, trace→logs)
# are re-added via Grafana Correlations provisioning (grafana/provisioning/... after datasources exist),
# which is the mechanism designed for cross-datasource links.
apiVersion: 1

# Delete provisioned datasources no longer present in a provisioning file.
prune: false

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: $PROMETHEUS_INTERNAL_URL # e.g. http://prometheus-yqhm.railway.internal:9090
    isDefault: true # the ONE default

  - name: Loki
    type: loki
    access: proxy # NOT direct — the browser can't reach *.railway.internal
    orgId: 1
    uid: loki
    url: $LOKI_INTERNAL_URL # e.g. http://loki.railway.internal:3100
    isDefault: false

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: tempo
    url: $TEMPO_INTERNAL_URL # QUERY API — e.g. http://tempo.railway.internal:3200 (NOT :4317)
    isDefault: false
